name: Update TFT comps
on:
  schedule:
    - cron: "0 6 * * 3"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm i cheerio
      - run: node scrape-tftactics.mjs
      - name: Commit
        run: |
          git config user.name  "tft-bot"
          git config user.email "bot@users.noreply.github.com"
          git add comps.js
          git commit -m "Auto-Update comps $(date +%F)" || echo "nichts geaendert"
          git push
